name: Build Android Release APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Set up Environment File
        run: cp .env.example .env

      - name: Generate Dummy Release Keystore
        run: |
          keytool -genkey -v -keystore my-upload-key.jks -storepass mypassword -alias upload -keypass mypassword -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Release,O=Android,C=US"

      - name: Build Release APK
        env:
          STORE_PASSWORD: mypassword
          KEY_PASSWORD: mypassword
        run: gradle assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: studydeck-release-apk
          path: app/build/outputs/apk/release/app-release.apk
